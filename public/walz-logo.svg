<svg width="120" height="156" viewBox="0 0 100 130" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Walz Travels">
  <title>Walz Travels</title>
  <defs>
    <clipPath id="wg">
      <circle cx="50" cy="50" r="48"/>
    </clipPath>
  </defs>

  <!-- Globe base -->
  <circle cx="50" cy="50" r="48" fill="#0B3D7A"/>

  <!-- Wave stripes -->
  <path d="M 2,5 Q 50,5 98,5 L 98,13 Q 50,12 2,13 Z" fill="#29ABE2" clip-path="url(#wg)"/>
  <path d="M 2,18 Q 50,15 98,18 L 98,26 Q 50,23 2,26 Z" fill="#29ABE2" clip-path="url(#wg)"/>
  <path d="M 2,31 Q 50,26 98,31 L 98,39 Q 50,34 2,39 Z" fill="#29ABE2" clip-path="url(#wg)"/>
  <path d="M 2,44 Q 50,37 98,44 L 98,52 Q 50,46 2,52 Z" fill="#29ABE2" clip-path="url(#wg)"/>
  <path d="M 2,57 Q 50,52 98,57 L 98,65 Q 50,61 2,65 Z" fill="#29ABE2" clip-path="url(#wg)"/>
  <path d="M 2,70 Q 50,67 98,70 L 98,78 Q 50,76 2,78 Z" fill="#29ABE2" clip-path="url(#wg)"/>
  <path d="M 2,83 Q 50,82 98,83 L 98,91 Q 50,91 2,91 Z" fill="#29ABE2" clip-path="url(#wg)"/>

  <!-- Border -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="white" stroke-width="2"/>

  <!-- "THE WALZ TRAVELS" text -->
  <text x="50" y="120" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="9.5" letter-spacing="2.5" fill="#0B3D7A" font-weight="600">
    THE WALZ TRAVELS
  </text>
</svg>
